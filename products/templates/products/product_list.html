{% extends "base.html" %}

{% block content %}

<div class="col-12">

    <div class="card">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h4 class="card-title mb-0">
                Products
            </h4>

            <button
                class="btn btn-primary"
                hx-get="{% url 'products:product_create' %}"
                hx-target="#modal-body"
                hx-swap="innerHTML">

                Add Product

            </button>

        </div>

        <div class="card-body">

            <div
                id="table-container"
                data-refresh-url="{% url 'products:product_table' %}">

                {% include "products/partials/product_table.html" %}

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="col-12">

    <div class="card">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h4 class="card-title">
                Products
            </h4>

<button
    class="btn btn-primary"

    hx-get="{% url 'products:product_create' %}"

    hx-target="#modal-body"

    hx-swap="innerHTML"
>
    Add Product
</button>

        </div>

        <div class="card-body">

            <table
                id="responsiveTable"
                class="table table-striped table-hover mb-0 align-middle dataTable"
                style="width:100%;"
            >

                <thead>

                    <tr>
                        <th>Product SKU Code</th>
                        <th>Product Name</th>
                        <th>Category</th>                        
                        <th>Product Unit</th>
                        <th>Product Type</th>
                        <th>Stock</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>

                </thead>

                {% include "products/partials/product_table.html" %}

            </table>

        </div>

    </div>

</div>
{% endblock content %}

<!doctype html>

{% load humanize %}

<html>

<head>

    <meta charset="utf-8">

    <style>

        @page {

            size: 210mm 99mm;

            background-image: url("{{ bg_image }}");


            /* =========================================
               MAIN CONTENT FRAME
            ========================================= */

            @frame content_frame {

                left: 20pt;

                top: 20pt;

                width: 555pt;

                height: 240pt;

            }


            /* =========================================
               RECEIPT DATE
            ========================================= */

            @frame receipt_date_frame {

                -pdf-frame-content: receipt_date;

                left: 445pt;

                width: 100pt;

                top: 73pt;

                height: 30pt;

            }


            /* =========================================
               RECEIVED FROM
            ========================================= */

            @frame received_from_frame {

                -pdf-frame-content: received_from;

                left: 220pt;

                width: 300pt;

                top: 113pt;

                height: 30pt;

            }


            /* =========================================
               RECEIPT NUMBER
            ========================================= */

            @frame receipt_number_frame {

                -pdf-frame-content: receipt_number;

                left: 530pt;

                width: 60pt;

                top: 73pt;

                height: 30pt;

            }


            /* =========================================
               AMOUNT IN WORDS
            ========================================= */

            @frame receipt_amount_words_frame {

                -pdf-frame-content: receipt_amount_words;

                left: 164pt;

                width: 400pt;

                top: 138pt;

                height: 30pt;

            }


            /* =========================================
               PAYMENT METHOD
            ========================================= */

            @frame receipt_status_frame {

                -pdf-frame-content: receipt_status;

                left: 160pt;

                width: 200pt;

                top: 190pt;

                height: 30pt;

            }


            /* =========================================
               PAYMENT FOR
            ========================================= */

            @frame payment_for_frame {

                -pdf-frame-content: payment_for;

                left: 85pt;

                width: 400pt;

                top: 163pt;

                height: 30pt;

            }


            /* =========================================
               AMOUNT NUMBER
            ========================================= */

            @frame amount_number_frame {

                -pdf-frame-content: amount_number;

                left: 125pt;

                width: 100pt;

                top: 237pt;

                height: 30pt;

            }

        }


        body {

            font-size: 14px;

            color: #302e90;

        }


        .receipt-field {

            color: #302e90;

            font-weight: bold;

        }

    </style>

</head>


<body>


    <!-- =========================================
         STATIC FRAME CONTENT
    ========================================== -->


    <div id="receipt_date">
        {{ receipt.receipt_date|date:"d/m/Y" }}
    </div>


    <div id="received_from">
        {{ receipt.invoice.customer.customer_name }}
    </div>


    <div id="receipt_number">
        {{ receipt_no }}
    </div>


    <div id="receipt_amount_words">
        {{ receipt.amount_in_words }}
    </div>


    <div id="receipt_status">
        {{ receipt.get_payment_method_display|upper }}
    </div>


    <div id="payment_for">
        {{ receipt.notes|default:"" }}
    </div>


    <div id="amount_number" style="text-align: center;">
        {{ receipt.amount|floatformat:0|intcomma }} /=
    </div>


</body>

</html>

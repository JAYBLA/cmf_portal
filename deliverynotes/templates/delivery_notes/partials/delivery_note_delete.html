<!-- =========================================
     MODAL HEADER
========================================== -->

<div class="modal-header">

    <h5 class="modal-title">
        Delete Delivery Note
    </h5>

    <button
        type="button"
        class="btn-close"
        data-bs-dismiss="modal"
    ></button>

</div>


<!-- =========================================
     DELETE FORM
========================================== -->

<form
    method="POST"
    hx-post="{% url 'delivery_notes:delivery_note_delete' delivery_note.id %}"
    hx-swap="none"
>

    {% csrf_token %}


    <!-- =========================================
         MODAL BODY
    ========================================== -->

    <div class="modal-body">

        <div
            class="
                alert
                alert-danger
                mb-0
            "
        >

            <div class="d-flex align-items-start gap-3">

                <div>

                    <i
                        class="
                            fa-solid
                            fa-triangle-exclamation
                            fs-4
                        "
                    ></i>

                </div>


                <div>

                    <h6 class="mb-2">

                        Confirm Delivery Note Deletion

                    </h6>


                    <p class="mb-2">

                        Are you sure you want to delete
                        delivery note

                        <strong>
                            {{ delivery_note.delivery_number }}
                        </strong>?

                    </p>


                    <small>

                        Customer:

                        <strong>

                            {{ delivery_note.customer.customer_name }}

                        </strong>

                    </small>


                    <div class="mt-2">

                        <small class="text-danger">

                            This action cannot be undone.

                        </small>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- =========================================
         MODAL FOOTER
    ========================================== -->

    <div class="modal-footer">

        <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
        >
            Cancel
        </button>


        <button
            type="submit"
            class="btn btn-danger"
        >

            <i class="fa-solid fa-trash me-1"></i>

            Delete Delivery Note

        </button>

    </div>

</form>

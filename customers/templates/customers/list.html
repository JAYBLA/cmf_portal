{% extends 'base.html' %}

{% block content %}
<div class="col-12">
  <div class="card shadow-sm">
    <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2 py-2">
      <h4 class="card-title mb-0 fs-5 fw-semibold">
        <i class="fa-solid fa-users me-2 text-primary"></i>Customers
      </h4>
      <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" hx-get="{% url 'customers:customer_create' %}" hx-target="#modal-body" hx-swap="innerHTML">
          <i class="fa-solid fa-plus me-1"></i>Add
        </button>
      </div>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-sm table-hover table-striped align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th class="ps-3">Customer</th>
              <th>Contact</th>
              <th>Financial</th>
              <th>Status</th>
              <th class="text-end pe-3">Actions</th>
            </tr>
          </thead>
          {% include 'customers/table.html' %}
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Refresh table after customer changes
  document.body.addEventListener('customerChanged', function() {
    htmx.ajax('GET', "{% url 'customers:customer_table' %}", {
      target: '#customer-table-body',
      swap: 'outerHTML'
    });
  });
</script>
{% endblock %}

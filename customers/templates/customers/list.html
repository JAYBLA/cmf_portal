{% extends "base.html" %}

{% block content %}

<div class="col-12">

    <div class="card">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h4 class="card-title">

                Customers

            </h4>

            <button

                class="btn btn-primary"

                hx-get="{% url 'customers:customer_create' %}"

                hx-target="#modal-body"

                hx-swap="innerHTML"

            >

                <i class="fa-solid fa-plus me-1"></i>

                Add Customer

            </button>

        </div>


        <div class="card-body">

            <div class="table-responsive">

                <table
                    class="
                        table
                        table-striped
                        table-hover
                        align-middle
                    "
                >

                    <thead>

                        <tr>

                            <th>

                                Customer Details

                            </th>

                            <th>

                                Contacts

                            </th>

                            <th>

                                Financials

                            </th>

                            <th>

                                Status

                            </th>

                            <th class="text-end">

                                Actions

                            </th>

                        </tr>

                    </thead>


                    {% include "customers/table.html" %}

                </table>

            </div>

        </div>

    </div>

</div>

{% endblock %}



{% block scripts %}

<script>

    // =====================================
    // CUSTOMER TABLE REFRESH
    // =====================================

    document.body.addEventListener(

        "customerChanged",

        function () {

            htmx.ajax(

                "GET",

                "{% url 'customers:customer_table' %}",

                {

                    target:
                        "#customer-table-body",

                    swap:
                        "outerHTML"

                }

            )

        }

    )

</script>

{% endblock %}

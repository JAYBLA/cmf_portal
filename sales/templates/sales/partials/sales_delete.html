<!-- templates/sales/partials/sale_delete.html -->

<div class="modal-header bg-danger text-white">

    <h5 class="modal-title">
        Delete Sale
    </h5>

    <button
        type="button"
        class="btn-close btn-close-white"
        data-bs-dismiss="modal"
        aria-label="Close">
    </button>

</div>

<form

    method="POST"

    hx-post="{% url 'sales:sale_delete' sale.id %}"

    hx-swap="none">

    {% csrf_token %}

    <div class="modal-body">

        <div class="text-center">

            <div class="mb-3">

                <i
                    class="fa-solid fa-trash text-danger"
                    style="font-size:60px;">
                </i>

            </div>

            <h4 class="mb-3">

                Confirm Delete

            </h4>

            <p class="text-muted mb-0">

                Are you sure you want to delete sale

                <strong class="text-dark">

                    {{ sale.sale_number }}

                </strong>

                for customer

                <strong class="text-dark">

                    {{ sale.customer }}

                </strong>?

            </p>

            {% if sale.total_amount %}

                <div class="alert alert-warning mt-3 mb-0">

                    <strong>
                        Warning:
                    </strong>

                    Deleting this sale will reverse all stock movements
                    associated with the sale items.

                </div>

            {% endif %}

        </div>

    </div>

    <div class="modal-footer">

        <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal">

            Cancel

        </button>

        <button
            type="submit"
            class="btn btn-danger">

            <i class="fa-solid fa-trash me-1"></i>

            Yes Delete

        </button>

    </div>

</form>

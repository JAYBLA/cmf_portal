{% extends "base.html" %}
{% load humanize %}

{% block content %}

<div class="card">

    <div
        class="card-header d-flex flex-wrap
               align-items-center justify-content-between gap-3"
    >

        <div>

            <h5 class="card-title mb-0">
                Declared Product Prices
            </h5>

        </div>


        <button
            type="button"
            class="btn btn-primary"
            hx-get="{% url 'sales:declared_price_create' %}"
            hx-target="#modal-body"
            hx-swap="innerHTML"
            data-bs-toggle="modal"
            data-bs-target="#globalModal"
        >

            <i class="ri-add-line"></i>

            Add Declared Price

        </button>

    </div>


    <div class="card-body">

        <div
            id="declaredPriceTable"
            hx-get="{% url 'sales:declared_price_table' %}"
            hx-trigger="refreshTable from:body"
            hx-swap="innerHTML"
        >

            {% include "sales/pricing/table.html" %}

        </div>

    </div>

</div>

{% endblock %}

<!-- templates/purchases/partials/purchase_delete.html -->

{% load widget_tweaks %}

<div class="modal-header bg-danger text-white">

    <h5 class="modal-title">
        Delete Purchase
    </h5>

    <button
        type="button"
        class="btn-close btn-close-white"
        data-bs-dismiss="modal"
        aria-label="Close"
    ></button>

</div>


<form

    method="POST"

    hx-post="{% url 'purchases:purchase_delete' purchase.id %}"

    hx-target="#purchase-{{ purchase.id }}"

    hx-swap="outerHTML"
>

    {% csrf_token %}


    <div class="modal-body">

        <div class="text-center">

            <div class="mb-3">

                <i
                    class="fa fa-trash text-danger"
                    style="font-size: 60px;"
                ></i>

            </div>

            <h4 class="mb-3">

                Confirm Delete

            </h4>

            <p class="text-muted mb-0">

                Are you sure you want to delete purchase

                <strong class="text-dark">

                    {{ purchase.purchase_number }}

                </strong>

                from supplier

                <strong class="text-dark">

                    {{ purchase.supplier }}

                </strong>?

            </p>

        </div>

    </div>


    <div class="modal-footer">

        <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
        >
            Cancel
        </button>

        <button
            type="submit"
            class="btn btn-danger"
        >

            <i class="fa fa-trash me-1"></i>

            Yes Delete

        </button>

    </div>

</form>

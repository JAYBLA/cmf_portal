{% extends "base.html" %}

{% block content %}

<div class="col-12">

    <div class="card">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h4 class="card-title mb-0">
                Additional Costs – {{ purchase.purchase_number }}
            </h4>

            <div>
                <a href="{% url 'purchases:purchase_list' %}" class="btn btn-sm btn-outline-secondary me-1">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </a>
                <button
                    class="btn btn-primary btn-sm"
                    hx-get="{% url 'purchases:additional_cost_create' purchase.id %}"
                    hx-target="#modal-body"
                    hx-swap="innerHTML">
                    <i class="fa-solid fa-plus me-1"></i> Add Cost
                </button>
            </div>

        </div>

        <div class="card-body p-1">

            <table
                id="responsiveTable"
                class="table table-sm table-hover align-middle"
                style="width:100%;">

                <thead class="table-light">
                    <tr>
                        <th scope="col" style="width:50px;" class="text-center">#</th>
                        <th scope="col">Cost Details</th>
                        <th scope="col" style="width:180px;" class="text-end">Actions</th>
                    </tr>
                </thead>

                <tbody
                    id="table-container"
                    data-refresh-url="{% url 'purchases:additional_cost_table' purchase.id %}">

                    {% include "purchases/additional_costs/table.html" %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}

<div class="modal-header bg-danger">

    <h5 class="modal-title text-white">

        Delete Additional Cost

    </h5>

    <button
        type="button"
        class="btn border-0 shadow-none p-0 text-white"
        data-bs-dismiss="modal"
    >
        <i class="fa-solid fa-xmark"></i>
    </button>

</div>


<form

    method="POST"

    hx-post="{% url 'purchases:additional_cost_delete' additional_cost.id %}"

    hx-swap="none"

>

    {% csrf_token %}


    <div class="modal-body text-center py-5">


        <!-- ICON -->

        <div class="mb-4">

            <div
                class="
                    d-inline-flex
                    align-items-center
                    justify-content-center
                    rounded-circle
                    bg-danger-subtle
                "
                style="
                    width: 90px;
                    height: 90px;
                "
            >

                <i
                    class="
                        fa-solid fa-money-bill-wave
                        text-danger
                    "
                    style="font-size: 38px;"
                ></i>

            </div>

        </div>


        <!-- TITLE -->

        <h4 class="fw-bold mb-3">

            Confirm Delete

        </h4>


        <!-- COST TYPE -->

        <div class="fw-bold text-dark fs-5">

            {{ additional_cost.get_cost_type_display }}

        </div>


        <!-- AMOUNT -->

        <div class="text-muted mt-2">

            {{ additional_cost.currency }}

            {{ additional_cost.amount|floatformat:2 }}

        </div>


        <!-- WARNING -->

        <div class="alert alert-warning mt-4 mb-0 text-start">

            <i class="fa-solid fa-triangle-exclamation me-2"></i>

            This action cannot be undone.

        </div>

    </div>


    <div class="modal-footer">

        <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
        >

            Cancel

        </button>


        <button
            type="submit"
            class="btn btn-danger"
        >

            <i class="fa-solid fa-trash-can me-1"></i>

            Yes Delete

        </button>

    </div>

</form>

{% extends "base.html" %}

{% block content %}

<div class="col-12">

    <div class="card">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h4 class="card-title mb-0">
                Payment Vouchers
            </h4>

            <button
                class="btn btn-primary"
                hx-get="{% url 'vouchers:voucher_create' %}"
                hx-target="#modal-body"
                hx-swap="innerHTML">

                Add Voucher

            </button>

        </div>

        <div class="card-body p-1">

            <table
                id="responsiveTable"
                class="table table-sm table-hover align-middle"
                style="width:100%;">

                <thead class="table-light">
                    <tr>
                        <th scope="col" style="width:50px;" class="text-center">#</th>
                        <th scope="col">Voucher Details</th>
                        <th scope="col" style="width:140px;" class="text-end">Actions</th>
                    </tr>
                </thead>

                <tbody
                    id="table-container"
                    data-refresh-url="{% url 'vouchers:voucher_table' %}">

                    {% include "vouchers/partials/voucher_table.html" %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
